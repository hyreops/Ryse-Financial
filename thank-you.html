<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You | RYSE Financial</title>
<style>
  :root{--black:#1b1b1b;--gold:#c9941f;--gold-soft:#e0ad3d;--cream:#f2efe6;--grey:#bdbdbd}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--black);color:var(--cream);min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;line-height:1.6;overflow-x:hidden}
  a{text-decoration:none}
  header{padding:22px 24px;display:flex;justify-content:center}
  .brand{display:flex;align-items:center;gap:10px}
  .brand .mark{width:24px;height:22px}
  .brand .mark .bar{fill:var(--cream)} .brand .mark .bar.g{fill:var(--gold)}
  .brand .txt{display:flex;flex-direction:column;line-height:1}
  .brand .txt b{font-size:18px;font-weight:800;letter-spacing:.06em;color:var(--cream)}
  .brand .txt .fin{font-size:9px;font-weight:600;letter-spacing:.34em;color:var(--gold);text-transform:uppercase;margin-top:3px}
  main{flex:1;display:flex;align-items:center;justify-content:center;padding:30px 22px 60px;position:relative}
  main::before{content:"";position:absolute;top:-80px;left:50%;transform:translateX(-50%);width:520px;height:520px;max-width:120vw;background:radial-gradient(circle,rgba(201,148,31,.18),transparent 62%);pointer-events:none}
  .box{position:relative;max-width:560px;text-align:center}
  .check{width:84px;height:84px;border-radius:50%;background:var(--gold);display:grid;place-items:center;margin:0 auto 26px;box-shadow:0 14px 40px rgba(201,148,31,.35);animation:pop .4s ease}
  @keyframes pop{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:none}}
  .check svg{width:42px;height:42px;stroke:#1b1b1b;stroke-width:3.5;fill:none}
  h1{font-size:42px;font-weight:800;letter-spacing:-.02em;line-height:1.05;margin-bottom:16px}
  h1 span{color:var(--gold)}
  p.lead{font-size:18px;color:#d6d4cc;max-width:440px;margin:0 auto 32px}
  .btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
  .btn{padding:15px 30px;border-radius:999px;font-weight:700;font-size:16px;transition:transform .15s ease,background .15s ease,border-color .15s ease}
  .btn-primary{background:var(--gold);color:#1b1b1b}
  .btn-primary:hover{transform:translateY(-2px);background:var(--gold-soft)}
  .btn-ghost{border:1.5px solid #3a3a3a;color:var(--cream)}
  .btn-ghost:hover{border-color:var(--gold);color:var(--gold)}
  .note{margin-top:30px;font-size:14px;color:#8f8d86}
  .note strong{color:var(--cream);font-weight:700}
  @media(max-width:560px){
    h1{font-size:32px}
    p.lead{font-size:16px}
    .btn{width:100%;text-align:center}
    .btns{flex-direction:column}
  }
</style>
</head>
<body>
<header>
  <a class="brand" href="/">
    <svg class="mark" viewBox="0 0 40 34" aria-hidden="true"><rect class="bar" x="2" y="20" width="6" height="12" rx="3"/><rect class="bar" x="12" y="14" width="6" height="18" rx="3"/><rect class="bar" x="22" y="8" width="6" height="24" rx="3"/><rect class="bar g" x="32" y="2" width="6" height="30" rx="3"/></svg>
    <span class="txt"><b>RYSE</b><span class="fin">Financial</span></span>
  </a>
</header>

<main>
  <div class="box">
    <div class="check">
      <svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>
    </div>
    <h1>You&rsquo;re <span>in.</span></h1>
    <p class="lead">Thanks for applying to RYSE Financial. Brendan will personally reach out shortly to see if it&rsquo;s the right fit.</p>
    <div class="btns">
      <a class="btn btn-primary" href="/">Back to Home</a>
    </div>
    <p class="note">Keep an eye on your <strong>phone and email</strong>. We move fast.</p>
  </div>
</main>
</body>
</html>
